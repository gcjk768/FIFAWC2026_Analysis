                      - strong [ref=e198]: entirely zeroed out
                      - text: for layer 0 and mostly zeroed for layer 1 — making coherent generation impossible regardless of any runner-side fix.
                    - paragraph [ref=e199]:
                      - text: This is a model-packaging issue, not a runtime bug. The
                      - code [ref=e200]: mlx-community/Qwen3.6-35B-A3B-4bit
                      - text: model (same architecture, same source weights, MLX 4-bit affine quant instead of NVFP4) has the expected natural sparsity (3-5%) in the same regions.
                    - heading "Reproducer" [level=2] [ref=e201]
