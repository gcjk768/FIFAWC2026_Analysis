                      - text: model file has corrupted K-projection weights for early linear-attention layers
                    - heading "What is the issue?" [level=2] [ref=e193]
                    - paragraph [ref=e194]:
                      - text: The NVFP4 packaging of
                      - code [ref=e195]: qwen3.6:35b-a3b-coding-nvfp4
                      - text: shipped from
