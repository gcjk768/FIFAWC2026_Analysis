                    - generic [ref=e226]:
                      - generic [ref=e227]: "# Reproduce against the cached blob (replace the SHA with whichever blob holds the layer-0 in_proj_qkv tensor): import struct, json, numpy as np blob = \"/Users/<you>/.ollama/models/blobs/sha256-...\" # blob carrying layers.0.linear_attn.in_proj_qkv with open(blob, 'rb') as f: hsz = struct.unpack('<Q', f.read(8))[0] hdr = json.loads(f.read(hsz)) body = 8 + hsz info = hdr['language_model.model.layers.0.linear_attn.in_proj_qkv.weight'] s, e = info['data_offsets'] f.seek(body + s) arr = np.frombuffer(f.read(e-s), dtype=np.uint32).reshape(info['shape']) print('K rows zero:', sum(1 for r in arr[2048:4096] if not r.any()), '/ 2048') # → 2048 / 2048 on the broken model"
